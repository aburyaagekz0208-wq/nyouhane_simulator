<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bullshit Tools - ブルシットツールズ</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --text-color: #e0e0e0;
            --card-bg: #16213e;
            --accent-color: #e94560;
            --hover-color: #0f3460;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin-top: 50px;
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            color: var(--accent-color);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #8892b0;
            margin-top: 10px;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1000px;
            padding-bottom: 50px;
        }

        .tool-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            text-decoration: none;
            color: var(--text-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid #2a2a4a;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            background-color: var(--hover-color);
            border-color: var(--accent-color);
        }

        .tool-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .tool-title {
            font-size: 1.5rem;
            margin: 0 0 10px 0;
            color: #fff;
        }

        .tool-desc {
            font-size: 0.95rem;
            color: #a0aec0;
            line-height: 1.5;
            flex-grow: 1;
        }

        .tool-tag {
            display: inline-block;
            margin-top: 15px;
            padding: 5px 10px;
            background-color: rgba(233, 69, 96, 0.2);
            color: var(--accent-color);
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            align-self: flex-start;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bullshit Tools</h1>
        <p class="subtitle">役に立つか立たないかはあなた次第。ニッチなWebツール群。</p>
    </header>

    <div class="tools-grid">
        <a href="pee_simulator.html" class="tool-card">
            <div class="tool-icon">🚽</div>
            <h2 class="tool-title">お絵かき尿はねシミュレーター</h2>
            <p class="tool-desc">Matter.jsによる物理演算を利用し、自由に描いた便器の壁に対する尿の跳ね返りをシミュレートします。飛沫の広がりを観察しよう。</p>
            <span class="tool-tag">Physics / Simulator</span>
        </a>

        <a href="function_viewer.html" class="tool-card">
            <div class="tool-icon">📈</div>
            <h2 class="tool-title">教育的関数ビュアー</h2>
            <p class="tool-desc">複雑な数式が形作る3Dグラフをグリグリ回して観察。スライダーで係数を操作し、数式とグラフのリアルタイムな連動を体験できます。</p>
            <span class="tool-tag">Math / 3D Viewer</span>
        </a>
    </div>

</body>
</html>
