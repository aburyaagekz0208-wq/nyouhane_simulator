<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>お絵かき尿はねシミュレーター</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; touch-action: none; }
        @media (hover: hover) and (pointer: fine) {
            body { cursor: crosshair; }
        }
        canvas { display: block; }
        #ui { 
            position: absolute; 
            top: 15px; left: 15px; 
            background: rgba(245,245,245,0.95); 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            font-family: sans-serif;
            pointer-events: auto;
            width: 280px; 
            box-sizing: border-box;
        }
        h2 { margin: 0 0 10px 0; font-size: 18px; text-align: center; color: #333; }
        p { font-size: 13px; margin: 5px 0; color: #555; line-height: 1.4; }
        .slider-container { margin-top: 15px; }
        .slider-container label { display: block; font-size: 13px; margin-bottom: 5px; font-weight: bold; color: #333;}
        input[type=range] { width: 100%; box-sizing: border-box; cursor: pointer; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button {
            flex: 1;
            padding: 12px 10px; 
            font-size: 14px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        button:hover { background-color: #45a049; }
        button.active { background-color: #ff9800; }
        button.danger { background-color: #f44336; }
        button.danger:hover { background-color: #da190b; }
    </style>
</head>
<body>
    <div id="ui" onmousedown="event.stopPropagation();" ontouchstart="event.stopPropagation();">
        <h2>尿はねシミュレーター</h2>
        <p>1. 画面をなぞって便器を描く</p>
        <p>2. 排尿を開始し、角度を変える</p>
        
        <div class="slider-container">
            <label for="speedSlider">尿の勢い: <span id="speedValue">18</span></label>
            <input type="range" id="speedSlider" min="5" max="30" value="18">
        </div>

        <div class="btn-group">
            <button id="toggleUrine">排尿開始</button>
            <button id="clearLines" class="danger">線を消す</button>
        </div>
    </div>

    <script>
        const Engine = Matter.Engine,
              Render = Matter.Render,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Constraint = Matter.Constraint,
              Vector = Matter.Vector,
              Body = Matter.Body;

        const engine = Engine.create({
            positionIterations: 10,
            velocityIterations: 10
        });
        
        engine.gravity.y = 0.4; 
        const world = engine.world;
        
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: '#ffffff'
            }
        });

        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
        });

        let drawnWalls = [];

        const pivotPoint = { x: window.innerWidth < 500 ? 100 : 200, y: 300 };
        let pointerPos = { x: window.innerWidth < 500 ? 300 : 500, y: 300 };
        
        const stick = Bodies.rectangle(pivotPoint.x + 50, pivotPoint.y, 100, 24, { 
            chamfer: { radius: 12 }, 
            collisionFilter: { group: -1 }, 
            render: { fillStyle: '#00ff00' }
        });

        const pivotConstraint = Constraint.create({
            pointA: pivotPoint,
            bodyB: stick,
            pointB: { x: -50, y: 0 },
            stiffness: 1,
            length: 0,
            render: { visible: false }
        });

        Composite.add(world, [stick, pivotConstraint]);

        // --- お絵かきロジック ---
        let isDrawing = false;
        let lastDrawPos = { x: 0, y: 0 };
        
        // 【修正1】精密計算により貫通がなくなったため、壁を極細(12px)に！
        const WALL_THICKNESS = 12; 

        function startDrawing(x, y) {
            isDrawing = true;
            lastDrawPos = { x, y };
            const startJoint = Bodies.circle(x, y, WALL_THICKNESS / 2, {
                isStatic: true,
                friction: 0.0,
                render: { fillStyle: '#333333', strokeStyle: 'transparent' }
            });
            drawnWalls.push(startJoint);
            Composite.add(world, startJoint);
        }

        function movePointer(x, y) {
            pointerPos.x = x;
            pointerPos.y = y;

            if (isDrawing) {
                const dx = pointerPos.x - lastDrawPos.x;
                const dy = pointerPos.y - lastDrawPos.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // 【修正2】生成間隔を短く(15px)し、角を極力減らして滑らかに
                if (dist > 15) { 
                    const midX = lastDrawPos.x + dx / 2;
                    const midY = lastDrawPos.y + dy / 2;
                    const angle = Math.atan2(dy, dx);

                    const wallSegment = Bodies.rectangle(midX, midY, dist, WALL_THICKNESS, {
                        isStatic: true,
                        angle: angle,
                        friction: 0.0,
                        render: { fillStyle: '#333333', strokeStyle: 'transparent' }
                    });

                    const joint = Bodies.circle(pointerPos.x, pointerPos.y, WALL_THICKNESS / 2, {
                        isStatic: true,
                        friction: 0.0,
                        render: { fillStyle: '#333333', strokeStyle: 'transparent' }
                    });

                    drawnWalls.push(wallSegment, joint);
                    Composite.add(world, [wallSegment, joint]);
                    
                    lastDrawPos = { x: pointerPos.x, y: pointerPos.y };
                }
            }
        }

        function endDrawing() { isDrawing = false; }

        document.addEventListener('mousedown', (e) => {
            if(e.target.closest('#ui')) return; 
            startDrawing(e.clientX, e.clientY);
        });
        document.addEventListener('mousemove', (e) => { movePointer(e.clientX, e.clientY); });
        document.addEventListener('mouseup', endDrawing);

        document.addEventListener('touchstart', (e) => {
            if(e.target.closest('#ui')) return;
            e.preventDefault();
            startDrawing(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
            movePointer(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        document.addEventListener('touchend', endDrawing);
        document.addEventListener('touchcancel', endDrawing);


        let isUrinating = false;
        let frameCount = 0;
        const toggleButton = document.getElementById('toggleUrine');
        const clearButton = document.getElementById('clearLines');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');

        speedSlider.addEventListener('input', (e) => { speedValue.textContent = e.target.value; });

        toggleButton.addEventListener('click', () => {
            isUrinating = !isUrinating;
            toggleButton.textContent = isUrinating ? "排尿停止" : "排尿開始";
            toggleButton.classList.toggle('active', isUrinating);
        });

        clearButton.addEventListener('click', () => {
            Composite.remove(world, drawnWalls);
            drawnWalls = [];
        });

        // --- 【大改造】超精密・自前ループによるサブステップ計算 ---
        // Matter.Runnerを使わず、自前でアニメーションを回します
        (function run() {
            window.requestAnimationFrame(run);

            // 1. 棒の角度更新
            const dx = pointerPos.x - pivotPoint.x;
            const dy = pointerPos.y - pivotPoint.y;
            const angle = Math.atan2(dy, dx);
            Body.setAngle(stick, angle);
            
            const stickLen = 100;
            Body.setPosition(stick, {
                x: pivotPoint.x + Math.cos(angle) * (stickLen / 2),
                y: pivotPoint.y + Math.sin(angle) * (stickLen / 2)
            });

            // 2. 尿の生成
            if (isUrinating && frameCount++ % 2 === 0) {
                const tipOffset = Vector.rotate({ x: 50, y: 0 }, stick.angle);
                const tipPos = Vector.add(stick.position, tipOffset);

                // 【修正3】壁が細くなったのに合わせて尿も細くし、跳ねないよう調整
                const particle = Bodies.circle(tipPos.x, tipPos.y, 3.5, {
                    restitution: 0.0,  // 全く反発させない
                    friction: 0.0,     // ツルツル滑る
                    frictionAir: 0.002,// 飛び出し後のリアルな失速
                    density: 0.1,
                    render: { fillStyle: '#ffcc00' }, 
                    collisionFilter: { group: -2 } 
                });

                const speed = parseFloat(speedSlider.value);
                const velocity = Vector.create(Math.cos(stick.angle) * speed, Math.sin(stick.angle) * speed);
                Body.setVelocity(particle, velocity);
                Composite.add(world, particle);

                setTimeout(() => { Composite.remove(world, particle); }, 3000);
            }

            // 3. 【貫通＆引っかかり防止の魔法】物理シミュレーションを4分割
            // 1フレームの計算を4回に分けることで、高速な物体も絶対に壁をすり抜けません
            const subSteps = 4;
            const subDelta = (1000 / 60) / subSteps;
            for (let i = 0; i < subSteps; i++) {
                Engine.update(engine, subDelta);
            }

            // 4. 描画
            Render.world(render);
        })();
    </script>
</body>
</html>
